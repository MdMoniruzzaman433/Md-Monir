<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Water Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'DM Sans',sans-serif;min-height:100vh;
      background:#08162A;display:flex;align-items:center;
      justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden;
    }
    .grid-bg{
      position:fixed;inset:0;
      background-image:linear-gradient(rgba(24,95,165,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(24,95,165,0.07) 1px,transparent 1px);
      background-size:48px 48px;animation:gridMove 20s linear infinite;
    }
    @keyframes gridMove{to{background-position:48px 48px;}}
    .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(24,95,165,0.15) 0%,transparent 70%);top:-150px;left:-100px;pointer-events:none;}
    .glow2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(29,158,117,0.1) 0%,transparent 70%);bottom:-50px;right:-50px;pointer-events:none;}
    .card{
      position:relative;z-index:2;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;width:100%;max-width:400px;padding:2.5rem 2rem;
      backdrop-filter:blur(12px);
    }
    .logo-area{text-align:center;margin-bottom:2rem;}
    .admin-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(24,95,165,0.2);border:1px solid rgba(24,95,165,0.4);
      color:#85B7EB;font-size:11px;font-family:'DM Mono',monospace;
      padding:4px 12px;border-radius:20px;margin-bottom:1.25rem;letter-spacing:1px;
    }
    .logo-area h1{font-family:'Playfair Display',serif;font-size:22px;color:white;font-weight:600;line-height:1.3;}
    .logo-area p{font-size:12px;color:rgba(255,255,255,0.35);margin-top:6px;letter-spacing:0.5px;}
    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,0.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;font-family:'DM Mono',monospace;}
    .field input{
      width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,0.12);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:14px;color:white;
      background:rgba(255,255,255,0.06);outline:none;transition:border-color 0.2s,box-shadow 0.2s;
    }
    .field input::placeholder{color:rgba(255,255,255,0.25);}
    .field input:focus{border-color:rgba(24,95,165,0.7);box-shadow:0 0 0 3px rgba(24,95,165,0.18);background:rgba(255,255,255,0.09);}
    .submit-btn{
      width:100%;padding:12px;border:none;border-radius:10px;
      background:linear-gradient(135deg,#185FA5,#0C447C);color:white;
      font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;
      transition:opacity 0.2s,transform 0.15s;margin-top:0.5rem;
    }
    .submit-btn:hover{opacity:0.9;} .submit-btn:active{transform:scale(0.98);}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .toast{display:none;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;font-weight:500;}
    .toast.error{background:rgba(163,45,45,0.25);border:1px solid rgba(247,193,193,0.3);color:#F09595;display:block;}
    .back-link{display:block;text-align:center;margin-top:1.25rem;font-size:12px;color:rgba(255,255,255,0.35);text-decoration:none;}
    .back-link:hover{color:rgba(255,255,255,0.6);}
    .hint{background:rgba(24,95,165,0.15);border:1px solid rgba(24,95,165,0.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#85B7EB;margin-bottom:1rem;font-family:'DM Mono',monospace;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="grid-bg"></div><div class="glow"></div><div class="glow2"></div>
  <div class="card">
    <div class="logo-area">
      <div class="admin-badge">⬡ ADMIN ACCESS</div>
      <h1>Water Management<br>System</h1>
      <p>Restricted — authorised personnel only</p>
    </div>
    <div class="hint">Default credentials:<br>Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong></div>
    <div id="toast" class="toast"></div>
    <div class="field">
      <label>Admin Username</label>
      <input type="text" id="username" placeholder="Enter admin username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')handleLogin()"/>
    </div>
    <button class="submit-btn" id="login-btn" onclick="handleLogin()">Sign In to Admin Panel</button>
    <a href="index.html" class="back-link">← Back to customer login</a>
  </div>
  <script>
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast error';setTimeout(()=>t.className='toast',4000);}
    function setLoading(on){const btn=document.getElementById('login-btn');btn.disabled=on;btn.innerHTML=on?'<span class="spinner"></span>Signing in...':'Sign In to Admin Panel';}
    async function handleLogin(){
      const u=document.getElementById('username').value.trim();
      const p=document.getElementById('password').value;
      if(!u||!p){showToast('Please enter username and password.');return;}
      setLoading(true);
      try{
        const res=await fetch('admin_auth.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',username:u,password:p})});
        const data=await res.json();
        if(data.success){sessionStorage.setItem('admin_logged_in','true');sessionStorage.setItem('admin_username',u);window.location.href='admin_dashboard.html';}
        else showToast(data.message);
      }catch(e){showToast('Could not connect to server. Make sure XAMPP is running.');}
      setLoading(false);
    }
  </script>
</body>
</html>
