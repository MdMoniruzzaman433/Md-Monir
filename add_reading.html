<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Meter Reading — Water Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F0F4F8;
      min-height: 100vh;
      color: #2C2C2A;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: linear-gradient(135deg, #042C53, #0C447C);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 62px;
      box-shadow: 0 2px 12px rgba(4,44,83,0.25);
      position: sticky; top: 0; z-index: 100;
    }
    .navbar-brand { display: flex; align-items: center; gap: 10px; }
    .drop-icon {
      width: 34px; height: 34px;
      background: linear-gradient(145deg, #185FA5, #1D9E75);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .drop-icon svg { width: 18px; height: 18px; fill: white; }
    .navbar-brand h1 { font-family: 'Playfair Display', serif; font-size: 16px; color: white; font-weight: 600; }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 6px 14px; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      text-decoration: none; transition: background 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.22); }

    /* ── MAIN ── */
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: #042C53; margin-bottom: 0.3rem;
    }
    .page-sub { font-size: 13px; color: #888780; margin-bottom: 1.75rem; }

    /* ── CARD ── */
    .card {
      background: white; border-radius: 16px;
      padding: 1.75rem 2rem;
      box-shadow: 0 2px 12px rgba(4,44,83,0.08);
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 14px; font-weight: 500; color: #042C53;
      margin-bottom: 1.25rem; padding-bottom: 10px;
      border-bottom: 1.5px solid #E2E8F0;
    }

    /* ── FORM ── */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block; font-size: 12px; font-weight: 500;
      color: #444441; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .field input, .field select {
      width: 100%; padding: 10px 14px;
      border: 1px solid #D3D1C7; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: #2C2C2A; background: #FAFAF8;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: #185FA5;
      box-shadow: 0 0 0 3px rgba(24,95,165,0.12);
      background: white;
    }
    .field input[readonly] {
      background: #F1EFE8; color: #888780; cursor: not-allowed;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── CONSUMPTION PREVIEW ── */
    .preview-box {
      display: none;
      background: #E6F1FB; border: 1px solid #B5D4F4;
      border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    .preview-box.show { display: block; }
    .preview-box .preview-label { font-size: 12px; color: #0C447C; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; }
    .preview-box .preview-val { font-size: 24px; font-weight: 500; color: #042C53; margin-top: 4px; }
    .preview-box .preview-sub { font-size: 12px; color: #185FA5; margin-top: 2px; }

    .warning-box {
      display: none;
      background: #FCEBEB; border: 1px solid #F7C1C1;
      border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: 1.25rem; font-size: 13px; color: #A32D2D;
    }
    .warning-box.show { display: block; }

    /* ── SUBMIT BTN ── */
    .submit-btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #185FA5, #0C447C);
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── TOAST ── */
    .toast { display: none; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 1rem; font-weight: 500; line-height: 1.5; }
    .toast.success { background: #EAF3DE; color: #3B6D11; display: block; }
    .toast.error   { background: #FCEBEB; color: #A32D2D; display: block; }

    /* ── RECENT TABLE ── */
    .table-wrap { border-radius: 12px; overflow: hidden; border: 1px solid #E2E8F0; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #042C53; }
    thead th { padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.6px; }
    tbody tr { border-bottom: 1px solid #F0F4F8; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 14px; font-size: 13px; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge.normal   { background: #EAF3DE; color: #3B6D11; }
    .badge.abnormal { background: #FCEBEB; color: #A32D2D; }
    .badge.faulty   { background: #FFF3CD; color: #856404; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="drop-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C12 2 5 10.5 5 15a7 7 0 0014 0C19 10.5 12 2 12 2z"/></svg>
    </div>
    <h1>Water Management System</h1>
  </div>
  <div class="nav-links">
    <a href="admin_dashboard.php" class="nav-link">← Admin Panel</a>
    <a href="index.html" class="nav-link" onclick="sessionStorage.clear()">Sign Out</a>
  </div>
</nav>

<div class="main">
  <p class="page-title">Add Meter Reading</p>
  <p class="page-sub">Enter current meter reading. Bill will be automatically generated after submission.</p>

  <div id="toast" class="toast"></div>

  <div class="card">
    <p class="card-title">Reading Details</p>

    <div class="field">
      <label>Select Meter</label>
      <select id="meter-select" onchange="loadMeterInfo()">
        <option value="">— Choose a meter —</option>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="cust-name" readonly placeholder="Auto-filled"/>
      </div>
      <div class="field">
        <label>Connection Type</label>
        <input type="text" id="conn-type" readonly placeholder="Auto-filled"/>
      </div>
    </div>

    <div class="field">
      <label>Previous Reading (units)</label>
      <input type="number" id="r-prev" readonly placeholder="Auto-filled from last reading"/>
    </div>

    <div class="field">
      <label>Current Reading (units) *</label>
      <input type="number" id="r-current" placeholder="Enter current meter reading" oninput="calcConsumption()"/>
    </div>

    <div class="field">
      <label>Reading Date</label>
      <input type="date" id="r-date"/>
    </div>

    <div id="preview" class="preview-box">
      <div class="preview-label">Consumption this period</div>
      <div class="preview-val" id="preview-val">0 units</div>
      <div class="preview-sub" id="preview-sub"></div>
    </div>

    <div id="warning" class="warning-box"></div>

    <button class="submit-btn" id="submit-btn" onclick="submitReading()">Save Reading & Generate Bill</button>
  </div>

  <!-- Recent Readings -->
  <div class="card">
    <p class="card-title">Recent Readings</p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Meter ID</th>
            <th>Date</th>
            <th>Previous</th>
            <th>Current</th>
            <th>Consumption</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="readings-tbody">
          <tr><td colspan="6" style="text-align:center;color:#888;padding:1.5rem">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // Set today's date as default
  document.getElementById('r-date').value = new Date().toISOString().split('T')[0];

  // Load meters into dropdown
  async function loadMeters() {
    try {
      const res  = await fetch('add_reading.php', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_meters' })
      });
      const data = await res.json();
      const sel  = document.getElementById('meter-select');
      if (data.success) {
        data.meters.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.Meter_ID;
          opt.dataset.prev    = m.last_reading  || 0;
          opt.dataset.name    = m.customer_name || '—';
          opt.dataset.ctype   = m.c_type        || '—';
          opt.dataset.cid     = m.Customer_ID;
          opt.dataset.mstatus = m.m_status;
          opt.textContent = `Meter #${m.Meter_ID} — ${m.customer_name} (${m.m_status})`;
          sel.appendChild(opt);
        });
      }
    } catch(e) { console.error(e); }
  }

  function loadMeterInfo() {
    const sel = document.getElementById('meter-select');
    const opt = sel.options[sel.selectedIndex];
    if (!opt.value) return;

    document.getElementById('r-prev').value   = opt.dataset.prev;
    document.getElementById('cust-name').value = opt.dataset.name;
    document.getElementById('conn-type').value = opt.dataset.ctype;

    if (opt.dataset.mstatus === 'Faulty') {
      showWarning('⚠️ This meter is marked as Faulty. Reading will be flagged as Faulty automatically.');
    } else {
      hideWarning();
    }
    calcConsumption();
  }

  function calcConsumption() {
    const prev = parseFloat(document.getElementById('r-prev').value) || 0;
    const curr = parseFloat(document.getElementById('r-current').value);
    if (isNaN(curr)) { document.getElementById('preview').classList.remove('show'); return; }

    const consumption = curr - prev;
    const preview = document.getElementById('preview');
    const previewVal = document.getElementById('preview-val');
    const previewSub = document.getElementById('preview-sub');

    preview.classList.add('show');
    previewVal.textContent = consumption.toFixed(2) + ' units';

    hideWarning();
    if (consumption < 0) {
      showWarning('⚠️ Current reading cannot be less than previous reading.');
      previewSub.textContent = '';
    } else if (consumption === 0) {
      showWarning('⚠️ Zero consumption detected — will be flagged as Faulty and an Alert will be created.');
      previewSub.textContent = 'Rate: 5 BDT/unit';
    } else if (consumption > 500) {
      showWarning('⚠️ Unusually high consumption detected — will be flagged as Abnormal and an Alert will be created.');
      previewSub.textContent = `Estimated bill: ৳${(consumption * 5 * 1.05).toFixed(2)} (incl. 5% tax)`;
    } else {
      previewSub.textContent = `Estimated bill: ৳${(consumption * 5 * 1.05).toFixed(2)} (incl. 5% tax)`;
    }
  }

  function showWarning(msg) { const w = document.getElementById('warning'); w.textContent = msg; w.classList.add('show'); }
  function hideWarning()    { document.getElementById('warning').classList.remove('show'); }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.innerHTML = msg; t.className = 'toast ' + type;
    setTimeout(() => t.className = 'toast', 5000);
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Saving...' : 'Save Reading & Generate Bill';
  }

  async function submitReading() {
    const meterId  = document.getElementById('meter-select').value;
    const rPrev    = document.getElementById('r-prev').value;
    const rCurrent = document.getElementById('r-current').value;
    const rDate    = document.getElementById('r-date').value;
    const sel      = document.getElementById('meter-select');
    const custId   = sel.options[sel.selectedIndex].dataset?.cid;

    if (!meterId)  { showToast('Please select a meter.', 'error'); return; }
    if (!rCurrent) { showToast('Please enter the current reading.', 'error'); return; }
    if (parseFloat(rCurrent) < parseFloat(rPrev)) { showToast('Current reading cannot be less than previous reading.', 'error'); return; }

    setLoading(true);
    try {
      const res  = await fetch('add_reading.php', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'add_reading', meter_id: meterId, r_prev: rPrev, r_current: rCurrent, r_date: rDate, customer_id: custId })
      });
      const data = await res.json();
      if (data.success) {
        showToast('✓ ' + data.message, 'success');
        document.getElementById('r-current').value = '';
        document.getElementById('preview').classList.remove('show');
        hideWarning();
        loadRecentReadings();
      } else {
        showToast(data.message, 'error');
      }
    } catch(e) {
      showToast('Could not connect to server. Make sure XAMPP is running.', 'error');
    }
    setLoading(false);
  }

  async function loadRecentReadings() {
    try {
      const res  = await fetch('add_reading.php', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'get_readings' })
      });
      const data = await res.json();
      const tbody = document.getElementById('readings-tbody');
      if (!data.success || data.readings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;padding:1.5rem">No readings found.</td></tr>';
        return;
      }
      tbody.innerHTML = data.readings.map(r => `
        <tr>
          <td>#${r.Meter_ID}</td>
          <td>${r.r_date}</td>
          <td>${parseFloat(r.r_prev).toFixed(2)}</td>
          <td>${parseFloat(r.r_current).toFixed(2)}</td>
          <td>${(parseFloat(r.r_current) - parseFloat(r.r_prev)).toFixed(2)}</td>
          <td><span class="badge ${r.r_status.toLowerCase()}">${r.r_status}</span></td>
        </tr>
      `).join('');
    } catch(e) { console.error(e); }
  }

  loadMeters();
  loadRecentReadings();
</script>
</body>
</html>
